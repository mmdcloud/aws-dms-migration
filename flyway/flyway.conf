# =============================================================================
# flyway.conf
# Flyway Feature: Configuration file (overrides CLI flags)
# Environment: AWS RDS MySQL 8.0 (destinationdb, us-east-1)
# =============================================================================

# --- Connection ---
# Resolved at runtime via env vars; never hardcode credentials here.
# Set: FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD as environment variables
# or pass via AWS Secrets Manager wrapper script (see scripts/run_flyway.sh).
flyway.url=jdbc:mysql://${RDS_ENDPOINT}:3306/destinationdb?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
flyway.user=${RDS_USER}
flyway.password=${RDS_PASSWORD}

# --- Migration locations ---
flyway.locations=filesystem:./migrations,filesystem:./callbacks

# --- Schema management ---
flyway.schemas=destinationdb
flyway.defaultSchema=destinationdb
flyway.createSchemas=false

# --- Versioned migration naming ---
# V{version}__{description}.sql  (two underscores)
# R__{description}.sql           for repeatable migrations
flyway.sqlMigrationPrefix=V
flyway.repeatableSqlMigrationPrefix=R
flyway.sqlMigrationSeparator=__

# --- Baseline (critical for DMS projects) ---
# If RDS already has tables from DMS full-load and you're running Flyway
# for the first time, set baselineOnMigrate=true to stamp the existing
# schema as V1 without re-running V1__baseline_schema.sql.
flyway.baselineOnMigrate=false
flyway.baselineVersion=1
flyway.baselineDescription=DMS_baseline

# --- Safety ---
# Prevent accidental migration on wrong DB
flyway.validateOnMigrate=true
flyway.cleanDisabled=true          # NEVER allow flyway clean on production
flyway.outOfOrderMigration=false   # Strict version ordering
flyway.ignoreMissingMigrations=false

# --- Encoding ---
flyway.encoding=UTF-8
flyway.placeholderReplacement=false

# --- Metadata table ---
flyway.table=flyway_schema_history

# --- Callbacks ---
flyway.callbacks=filesystem:./callbacks

# --- Logging ---
flyway.loggers=console
