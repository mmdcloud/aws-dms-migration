# =============================================================================
# .github/workflows/flyway-migrate.yml
# Flyway Feature: CI/CD integration
# Purpose: Run Flyway validate on PRs; migrate on merge to main.
#          Credentials pulled from GitHub Secrets → AWS Secrets Manager.
# =============================================================================

name: Flyway Schema Migration

on:
  pull_request:
    paths:
      - 'flyway-migration/migrations/**'
      - 'flyway-migration/callbacks/**'
      - 'flyway-migration/conf/**'
  push:
    branches: [main]
    paths:
      - 'flyway-migration/migrations/**'
      - 'flyway-migration/callbacks/**'

env:
  AWS_REGION: us-east-1
  RDS_SECRET_NAME: destination-rds-secrets   # matches main.tf

jobs:

  # -----------------------------------------------------------------------
  # PR: validate migration files (no DB changes)
  # -----------------------------------------------------------------------
  validate:
    name: Flyway Validate (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: destinationdb
          MYSQL_USER: flyway
          MYSQL_PASSWORD: flyway_test
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Run Flyway validate (local MySQL)
        uses: docker://flyway/flyway:10
        with:
          args: >-
            -url="jdbc:mysql://localhost:3306/destinationdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
            -user=flyway
            -password=flyway_test
            -locations=filesystem:flyway-migration/migrations,filesystem:flyway-migration/callbacks
            -cleanDisabled=true
            validate

  # -----------------------------------------------------------------------
  # Main: migrate against real RDS
  # -----------------------------------------------------------------------
  migrate:
    name: Flyway Migrate (RDS)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production    # requires manual approval if configured

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch RDS credentials from Secrets Manager
        id: secrets
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "$RDS_SECRET_NAME" \
            --query SecretString --output text)
          echo "RDS_USER=$(echo $SECRET | python3 -c "import sys,json;print(json.load(sys.stdin)['username'])")" >> $GITHUB_ENV
          echo "RDS_PASSWORD=$(echo $SECRET | python3 -c "import sys,json;print(json.load(sys.stdin)['password'])")" >> $GITHUB_ENV
          echo "::add-mask::$RDS_PASSWORD"

      - name: Get RDS endpoint from Terraform output
        run: |
          echo "RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }}" >> $GITHUB_ENV

      - name: Flyway info (pre-migration state)
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: "jdbc:mysql://${{ env.RDS_ENDPOINT }}:3306/destinationdb?useSSL=true&requireSSL=true&serverTimezone=UTC"
          FLYWAY_USER: ${{ env.RDS_USER }}
          FLYWAY_PASSWORD: ${{ env.RDS_PASSWORD }}
        with:
          args: -locations=filesystem:flyway-migration/migrations info

      - name: Flyway migrate
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: "jdbc:mysql://${{ env.RDS_ENDPOINT }}:3306/destinationdb?useSSL=true&requireSSL=true&serverTimezone=UTC"
          FLYWAY_USER: ${{ env.RDS_USER }}
          FLYWAY_PASSWORD: ${{ env.RDS_PASSWORD }}
          FLYWAY_CLEAN_DISABLED: "true"
          FLYWAY_VALIDATE_ON_MIGRATE: "true"
        with:
          args: >-
            -locations=filesystem:flyway-migration/migrations,filesystem:flyway-migration/callbacks
            migrate

      - name: Flyway info (post-migration state)
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: "jdbc:mysql://${{ env.RDS_ENDPOINT }}:3306/destinationdb?useSSL=true&requireSSL=true&serverTimezone=UTC"
          FLYWAY_USER: ${{ env.RDS_USER }}
          FLYWAY_PASSWORD: ${{ env.RDS_PASSWORD }}
        with:
          args: -locations=filesystem:flyway-migration/migrations info
